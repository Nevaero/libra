spring.application.name=libra

# Feed subscriptions (provider → instruments), bound by PricingProperties.
spring.config.import=classpath:pricing-subscriptions.yml

# Datasource Postgres (aligner avec compose.yaml quand il sera complet).
spring.datasource.url=jdbc:postgresql://localhost:5433/libra
spring.datasource.username=libra
spring.datasource.password=libra
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway : migrations executes au boot.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Kafka broker (aligner avec compose.yaml — apache/kafka KRaft, port 9092).
spring.kafka.bootstrap-servers=localhost:9092

# Spring Modulith outbox (JPA + Kafka externalization).
# Note : depuis Modulith 2.x, la table `event_publication` n'est plus créée
# automatiquement — elle est matérialisée par Flyway (V1__schema.sql).
spring.modulith.events.republish-outstanding-events-on-restart=true
spring.modulith.events.externalization.enabled=true

# Actuator + Prometheus.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Cache (Caffeine) : reference-data resolved by polymorphic mappers (Asset / Instrument / Currency)
# is read-heavy and immutable in practice. Cached to avoid N+1 lookups when rehydrating
# JournalEntry / Posting / Balance / Order trees. Expiry kept short (10m) to allow corrections
# via admin endpoints to propagate without restart.
spring.cache.type=caffeine
spring.cache.cache-names=currencies,securities,currency-pairs,assets,instruments,money
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=10m
